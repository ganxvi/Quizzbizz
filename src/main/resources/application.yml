server:
  port: 8081

spring:
  application:
    name: online-quiz-application

  # ====== Default profile: H2 in-file database (zero setup, great for demo/interview) ======
  datasource:
    url: jdbc:h2:file:./data/quizdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

# ====== To use MySQL instead, run with --spring.profiles.active=mysql ======
---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3307/quizdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect

---
app:
  jwt:
    secret: "ThisIsADemoSecretKeyForQuizAppPleaseChangeInProduction123456"
    expiration-ms: 86400000   # 24 hours
  
  google:
    client-id: "726758184032-3nsr7sncthlnlt527r8nbgv525t9ruis.apps.googleusercontent.com"   # paste your Google OAuth Client ID here (from Google Cloud Console)
    
  cors:
    allowed-origins: "*"
